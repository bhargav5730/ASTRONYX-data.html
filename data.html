<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Backend Data Table</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 20px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 4px 8px;
  }
  thead {
    background: #f0f0f0;
  }
</style>
</head>
<body>
<h2>Backend Data: 16,384 Rows, 2 Columns</h2>
<table id="dataTable">
  <thead>
    <tr>
      <th>Column 1</th>
      <th>Column 2</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
<script>
  const tbody = document.querySelector('#dataTable tbody');
  const totalRows = 16384;
  for(let i=1; i<=totalRows; i++) {
    const row = document.createElement('tr');
    row.innerHTML = `<td>Row ${i} - Col 1</td><td>Row ${i} - Col 2</td>`;
    tbody.appendChild(row);
  }
</script>
</body>
</html>
